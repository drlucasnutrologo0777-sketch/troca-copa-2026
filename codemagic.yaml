# TROCA COPA 2026 — iPhone (TestFlight)
#
# Codemagic (app troca-copa-2026 → Environment variables → grupo troca_copa_apple, Secret):
#   APP_STORE_CONNECT_ISSUER_ID      = b681d77e-4c5b-4154-b3e4-962dab155c2d
#   APP_STORE_CONNECT_KEY_IDENTIFIER = VHR75L74MJ
#   APP_STORE_CONNECT_PRIVATE_KEY    = conteudo do AuthKey_VHR75L74MJ.p8
#   CERTIFICATE_PRIVATE_KEY          = conteudo de private/ios_distribution_private_key.pem
#
# Rode COLE-CHAVE-CODEMAGIC.bat uma vez para copiar a chave e abrir o Codemagic.

workflows:
  troca-copa-ios:
    name: TROCA COPA 2026 — iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - troca_copa_apple
      vars:
        APP_STORE_APPLE_ID: 6780245563
        BUNDLE_ID: com.mycompany.trocafigurinha
        CM_CERTIFICATE_PASSWORD: TrocaCopa2026
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch App Store profile from Apple
        script: |
          set -e
          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] || [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ] || [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then
            echo "ERRO: faltam variaveis Apple API no grupo troca_copa_apple."
            exit 1
          fi
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "ERRO: falta CERTIFICATE_PRIVATE_KEY no grupo troca_copa_apple."
            echo "Rode COLE-CHAVE-CODEMAGIC.bat no Windows e cole no Codemagic."
            exit 1
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles \
            --strict-match-identifier \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --p12-password "$CM_CERTIFICATE_PASSWORD" \
            --verbose
          keychain add-certificates
      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=1

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - drlucasnutrologo0777@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
