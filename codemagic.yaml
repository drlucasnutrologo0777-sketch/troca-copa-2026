# TROCA COPA 2026 — iPhone (TestFlight)
# Bundle: com.mycompany.trocafigurinha
# Codemagic: Team integrations → Developer Portal → chave "codemagic" (ou Troca Copa)

workflows:
  troca-copa-ios:
    name: TROCA COPA 2026 — iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.trocafigurinha
      vars:
        APP_STORE_APPLE_ID: 6780245563
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files from Apple
        script: |
          set -e
          app-store-connect fetch-signing-files "com.mycompany.trocafigurinha" \
            --type IOS_APP_STORE \
            --create \
            --strict-match-identifier
          keychain add-certificates
      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=1 \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - drlucasnutrologo0777@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
