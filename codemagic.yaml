# TROCA COPA 2026 — iPhone (TestFlight)
# Chave API e assinatura ficam em ios/codemagic_signing/ (no repo).
# Nao precisa colar PRIVATE_KEY no Codemagic.

workflows:
  troca-copa-ios:
    name: TROCA COPA 2026 — iOS
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      vars:
        APP_STORE_APPLE_ID: 6780245563
        APP_STORE_CONNECT_ISSUER_ID: b681d77e-4c5b-4154-b3e4-962dab155c2d
        APP_STORE_CONNECT_KEY_IDENTIFIER: VHR75L74MJ
        APP_STORE_CONNECT_API_KEY_PATH: ios/codemagic_signing/AuthKey_VHR75L74MJ.p8
        BUNDLE_ID: com.mycompany.trocafigurinha
        CM_CERTIFICATE_PASSWORD: TrocaCopa2026
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: AVISO — isto e TROCA COPA (nao Idoso Care)
        script: |
          echo "========== TROCA COPA 2026 — NAO E IDOSO CARE =========="
          echo "Para Idoso Care no iPhone: workflow 'Idoso Care 24H — iOS TestFlight'"
      - name: Verificar credenciais Apple
        script: |
          set -e
          API_KEY="$APP_STORE_CONNECT_API_KEY_PATH"
          if [ ! -f "$API_KEY" ]; then
            echo "ERRO: chave API nao encontrada em $API_KEY"
            exit 1
          fi
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat "$API_KEY")"
          openssl pkey -in "$API_KEY" -noout
          echo "Chave API Apple OK"
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          keychain add-certificates \
            --certificate ios/codemagic_signing/distribution.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          PROFILE="ios/codemagic_signing/app_store.mobileprovision"
          PROFILE_UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --profile "$PROFILE"
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          set -e
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --profile ios/codemagic_signing/app_store.mobileprovision
          flutter build ipa --release \
            --build-name=1.0.6 \
            --build-number=26 \
            --export-options-plist=ios/codemagic_signing/ExportOptions.plist
          ls -la build/ios/ipa/
          IPA_CHECK=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "=== Build number no IPA (deve ser 26) ==="
          unzip -p "$IPA_CHECK" "Payload/*.app/Info.plist" | plutil -extract CFBundleVersion raw -
      - name: Upload to App Store Connect (TestFlight)
        script: |
          set -e
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "ERRO: arquivo .ipa nao encontrado em build/ios/ipa/"
            exit 1
          fi
          API_KEY="$APP_STORE_CONNECT_API_KEY_PATH"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat "$API_KEY")"
          echo "Enviando IPA para App Store Connect: $IPA"
          app-store-connect publish \
            --path "$IPA" \
            --private-key "@file:$API_KEY" \
            --max-find-build-wait 900 \
            --max-build-processing-wait 3600 \
            --verbose
          echo "Upload concluido. Abra TestFlight no App Store Connect."

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - drlucasnutrologo0777@gmail.com
        notify:
          success: true
          failure: true

  idoso-care-ios:
    name: Idoso Care 24H — iOS TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2
    working_directory: idoso-care-24h

    environment:
      vars:
        APP_STORE_CONNECT_ISSUER_ID: b681d77e-4c5b-4154-b3e4-962dab155c2d
        APP_STORE_CONNECT_KEY_IDENTIFIER: VHR75L74MJ
        APP_STORE_CONNECT_API_KEY_PATH: ../ios/codemagic_signing/AuthKey_VHR75L74MJ.p8
        CERTIFICATE_PRIVATE_KEY_PATH: ../ios/codemagic_signing/ios_distribution_private_key.pem
        BUNDLE_ID: com.idosocare24h.app
        CM_CERTIFICATE_PASSWORD: TrocaCopa2026
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: CONFIRMAR IDOSO CARE WEB (nao Troca Copa)
        script: |
          set -e
          echo "========== IDOSO CARE 24H — BUILD 41 (ofertas, chat, multa, sem pix-pay) =========="
          echo "Diretorio: $(pwd)"
          test -f web_app/index.html || { echo "ERRO: pasta idoso-care-24h nao encontrada"; exit 1; }
          bash tool/verify_web_build.sh
          echo "Commit: $(git rev-parse --short HEAD)"
      - name: Verificar credenciais Apple
        script: |
          set -e
          API_KEY="$APP_STORE_CONNECT_API_KEY_PATH"
          if [ ! -f "$API_KEY" ]; then
            echo "ERRO: AuthKey nao encontrada em $API_KEY"
            exit 1
          fi
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat "$API_KEY")"
          openssl pkey -in "$API_KEY" -noout
          echo "Chave API Apple OK"
      - name: Perfil App Store (cria se nao existir)
        script: |
          set -e
          API_KEY="$APP_STORE_CONNECT_API_KEY_PATH"
          CERT_KEY="$CERTIFICATE_PRIVATE_KEY_PATH"
          if [ ! -f "$CERT_KEY" ]; then
            echo "ERRO: chave privada nao encontrada em $CERT_KEY"
            exit 1
          fi
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat "$API_KEY")"
          export CERTIFICATE_PRIVATE_KEY="$(cat "$CERT_KEY")"
          keychain initialize
          echo "Buscando/criando certificado e perfil para $BUNDLE_ID ..."
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:"$CERT_KEY" \
            --verbose
          keychain add-certificates
          xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          set -e
          xcode-project use-profiles --project ios/Runner.xcodeproj
          EXPORT_PLIST="/Users/builder/export_options.plist"
          if [ ! -f "$EXPORT_PLIST" ]; then
            EXPORT_PLIST="$HOME/export_options.plist"
          fi
          if [ ! -f "$EXPORT_PLIST" ]; then
            echo "ERRO: export_options.plist nao gerado pelo use-profiles"
            exit 1
          fi
          echo "Export options: $EXPORT_PLIST"
          flutter build ipa --release \
            --build-name=2.0.0 \
            --build-number=41 \
            --export-options-plist="$EXPORT_PLIST"
          ls -la build/ios/ipa/
          IPA_CHECK=$(find build/ios/ipa -name "*.ipa" | head -1)
          bash tool/verify_web_build.sh --ipa "$IPA_CHECK"
      - name: Upload TestFlight
        script: |
          set -e
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "ERRO: .ipa nao encontrado"
            exit 1
          fi
          API_KEY="$APP_STORE_CONNECT_API_KEY_PATH"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat "$API_KEY")"
          pip3 install --quiet PyJWT requests
          APP_STORE_APPLE_ID=$(python3 tool/resolve_asc_apple_id.py)
          echo "Bundle $BUNDLE_ID -> Apple ID $APP_STORE_APPLE_ID"
          echo "Enviando Idoso Care para App Store Connect: $IPA"
          app-store-connect publish \
            --path "$IPA" \
            --private-key "@file:$API_KEY" \
            --altool-additional-arguments "--apple-id $APP_STORE_APPLE_ID" \
            --max-find-build-wait 900 \
            --max-build-processing-wait 3600 \
            --verbose
          echo "Upload concluido. TestFlight no App Store Connect."

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - drlucasnutrologo0777@gmail.com
        notify:
          success: true
          failure: true
