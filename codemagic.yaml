# TROCA COPA 2026 — iPhone (TestFlight)
# Chave API e assinatura ficam em ios/codemagic_signing/ (no repo).
# Nao precisa colar PRIVATE_KEY no Codemagic.

workflows:
  troca-copa-ios:
    name: TROCA COPA 2026 — iOS
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      vars:
        APP_STORE_APPLE_ID: 6780245563
        APP_STORE_CONNECT_ISSUER_ID: b681d77e-4c5b-4154-b3e4-962dab155c2d
        APP_STORE_CONNECT_KEY_IDENTIFIER: VHR75L74MJ
        APP_STORE_CONNECT_API_KEY_PATH: ios/codemagic_signing/AuthKey_VHR75L74MJ.p8
        BUNDLE_ID: com.mycompany.trocafigurinha
        CM_CERTIFICATE_PASSWORD: TrocaCopa2026
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Verificar credenciais Apple
        script: |
          set -e
          API_KEY="$APP_STORE_CONNECT_API_KEY_PATH"
          if [ ! -f "$API_KEY" ]; then
            echo "ERRO: chave API nao encontrada em $API_KEY"
            exit 1
          fi
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat "$API_KEY")"
          openssl pkey -in "$API_KEY" -noout
          echo "Chave API Apple OK"
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          keychain add-certificates \
            --certificate ios/codemagic_signing/distribution.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          PROFILE="ios/codemagic_signing/app_store.mobileprovision"
          PROFILE_UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --profile "$PROFILE"
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          set -e
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --profile ios/codemagic_signing/app_store.mobileprovision
          flutter build ipa --release \
            --build-name=1.0.6 \
            --build-number=25 \
            --export-options-plist=ios/codemagic_signing/ExportOptions.plist
          ls -la build/ios/ipa/
          IPA_CHECK=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "=== Build number no IPA (deve ser 25) ==="
          unzip -p "$IPA_CHECK" "Payload/*.app/Info.plist" | plutil -extract CFBundleVersion raw -
      - name: Upload to App Store Connect (TestFlight)
        script: |
          set -e
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "ERRO: arquivo .ipa nao encontrado em build/ios/ipa/"
            exit 1
          fi
          API_KEY="$APP_STORE_CONNECT_API_KEY_PATH"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat "$API_KEY")"
          echo "Enviando IPA para App Store Connect: $IPA"
          app-store-connect publish \
            --path "$IPA" \
            --private-key "@file:$API_KEY" \
            --max-find-build-wait 900 \
            --max-build-processing-wait 3600 \
            --verbose
          echo "Upload concluido. Abra TestFlight no App Store Connect."

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - drlucasnutrologo0777@gmail.com
        notify:
          success: true
          failure: true
