# TROCA COPA 2026 — iPhone (TestFlight)
#
# Configure UMA VEZ no Codemagic (app troca-copa-2026 → Environment variables):
# Grupo: troca_copa_apple (marcar Secret em todas)
#   APP_STORE_CONNECT_ISSUER_ID      = b681d77e-4c5b-4154-b3e4-962dab155c2d
#   APP_STORE_CONNECT_KEY_IDENTIFIER = VHR75L74MJ
#   APP_STORE_CONNECT_PRIVATE_KEY    = conteudo do AuthKey_VHR75L74MJ.p8
#   CERTIFICATE_PRIVATE_KEY          = (opcional) chave RSA fixa; se omitir, o build gera uma

workflows:
  troca-copa-ios:
    name: TROCA COPA 2026 — iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - troca_copa_apple
      vars:
        APP_STORE_APPLE_ID: 6780245563
        BUNDLE_ID: com.mycompany.trocafigurinha
        CM_CERTIFICATE_PASSWORD: TrocaCopa2026
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch App Store profile from Apple
        script: |
          set -e
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "Gerando chave RSA para certificado de distribuicao..."
            openssl genrsa -out /tmp/codemagic_dist_key.pem 2048
            export CERTIFICATE_PRIVATE_KEY="$(cat /tmp/codemagic_dist_key.pem)"
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles \
            --strict-match-identifier \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --p12-password "$CM_CERTIFICATE_PASSWORD" \
            --verbose
          keychain add-certificates
      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=1

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - drlucasnutrologo0777@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
