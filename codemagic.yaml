# TROCA COPA 2026 — iPhone (TestFlight)
# Repositório GitHub: troca-copa-2026 (raiz = este projeto)
# Bundle: com.mycompany.trocafigurinha

workflows:
  troca-copa-ios:
    name: TROCA COPA 2026 — iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.trocafigurinha
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: Fetch iOS signing files from Apple
        script: |
          app-store-connect fetch-signing-files "com.mycompany.trocafigurinha" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
      - name: Code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=$CM_BUILD_DIR/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - drlucasnutrologo0777@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
