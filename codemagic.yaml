# TROCA COPA 2026 — iPhone (TestFlight)
# Assinatura iOS: arquivos em ios/codemagic_signing/ (no repo, sem Mac).
#
# Codemagic → Environment variables → grupo troca_copa_apple (Secret):
#   APP_STORE_CONNECT_ISSUER_ID
#   APP_STORE_CONNECT_KEY_IDENTIFIER
#   APP_STORE_CONNECT_PRIVATE_KEY  (conteudo do AuthKey_VHR75L74MJ.p8)

workflows:
  troca-copa-ios:
    name: TROCA COPA 2026 — iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - troca_copa_apple
      vars:
        APP_STORE_APPLE_ID: 6780245563
        BUNDLE_ID: com.mycompany.trocafigurinha
        CM_CERTIFICATE_PASSWORD: TrocaCopa2026
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          keychain add-certificates \
            --certificate ios/codemagic_signing/distribution.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          PROFILE="ios/codemagic_signing/app_store.mobileprovision"
          PROFILE_UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=1

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - drlucasnutrologo0777@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
