# TROCA COPA 2026 — iPhone (TestFlight)
#
# OBRIGATÓRIO no Codemagic (uma vez):
# Team integrations → Developer Portal → Add key → nome EXATAMENTE: codemagic
# Issuer ID: b681d77e-4c5b-4154-b3e4-962dab155c2d
# Key ID: VHR75L74MJ
# Arquivo: AuthKey_VHR75L74MJ.p8

workflows:
  troca-copa-ios:
    name: TROCA COPA 2026 — iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      vars:
        APP_STORE_APPLE_ID: 6780245563
        BUNDLE_ID: com.mycompany.trocafigurinha
        CM_CERTIFICATE_PASSWORD: TrocaCopa2026
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Create Apple Distribution certificate (with private key)
        script: |
          set -e
          echo "Criando certificado Distribution na Apple (Codemagic guarda a chave)..."
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --save \
            --p12-password "$CM_CERTIFICATE_PASSWORD" \
            --verbose || echo "Certificado Distribution ja existe ou limite Apple — continuando"
      - name: Fetch App Store profile from Apple
        script: |
          set -e
          echo "Criando/buscando perfil App Store para $BUNDLE_ID ..."
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles \
            --strict-match-identifier \
            --verbose
          keychain add-certificates
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true
          ls -la ~/Library/MobileDevice/Certificates/ || true
      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=1 \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - drlucasnutrologo0777@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
