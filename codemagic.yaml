# TROCA COPA 2026 — iPhone (TestFlight)
#
# Codemagic → Environment variables → grupo troca_copa_apple (Secret):
#   APP_STORE_CONNECT_ISSUER_ID      = b681d77e-4c5b-4154-b3e4-962dab155c2d
#   APP_STORE_CONNECT_KEY_IDENTIFIER = VHR75L74MJ
#   APP_STORE_CONNECT_PRIVATE_KEY    = conteudo do .p8 OU use a linha unica:
#   APP_STORE_CONNECT_PRIVATE_KEY_B64 = arquivo COLE_BASE64_NO_CODEMAGIC.txt (mais facil)
#
# IMPORTANTE: a chave API na Apple precisa permissao "App Manager" (nao so Developer).

workflows:
  troca-copa-ios:
    name: TROCA COPA 2026 — iOS
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      groups:
        - troca_copa_apple
      vars:
        APP_STORE_APPLE_ID: 6780245563
        BUNDLE_ID: com.mycompany.trocafigurinha
        CM_CERTIFICATE_PASSWORD: TrocaCopa2026
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Verificar credenciais Apple
        script: |
          set -e
          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "ERRO: falta APP_STORE_CONNECT_ISSUER_ID no grupo troca_copa_apple"
            exit 1
          fi
          if [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ]; then
            echo "ERRO: falta APP_STORE_CONNECT_KEY_IDENTIFIER no grupo troca_copa_apple"
            exit 1
          fi
          if [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ] && [ -z "$APP_STORE_CONNECT_PRIVATE_KEY_B64" ]; then
            echo "ERRO: falta APP_STORE_CONNECT_PRIVATE_KEY ou APP_STORE_CONNECT_PRIVATE_KEY_B64"
            exit 1
          fi
          python3 tools/prepare_apple_api_key.py /tmp/AuthKey.p8
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/AuthKey.p8)"
          echo "Chave API Apple validada"
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          keychain add-certificates \
            --certificate ios/codemagic_signing/distribution.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          PROFILE="ios/codemagic_signing/app_store.mobileprovision"
          PROFILE_UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --profile "$PROFILE"
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          set -e
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --profile ios/codemagic_signing/app_store.mobileprovision
          flutter build ipa --release \
            --build-name=1.0.1 \
            --build-number=6 \
            --export-options-plist=ios/codemagic_signing/ExportOptions.plist
          ls -la build/ios/ipa/
      - name: Upload to App Store Connect (TestFlight)
        script: |
          set -e
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "ERRO: arquivo .ipa nao encontrado em build/ios/ipa/"
            exit 1
          fi
          python3 tools/prepare_apple_api_key.py /tmp/AuthKey.p8
          echo "Enviando para App Store Connect: $IPA"
          app-store-connect publish \
            --path "$IPA" \
            --private-key @file:/tmp/AuthKey.p8 \
            --testflight \
            --max-find-build-wait 900 \
            --max-build-processing-wait 3600 \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - drlucasnutrologo0777@gmail.com
        notify:
          success: true
          failure: true
