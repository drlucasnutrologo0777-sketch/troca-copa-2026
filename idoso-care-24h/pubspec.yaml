publish_to: 'none'
version: 2.0.0+36

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_inappwebview: ^6.1.5
  firebase_core: ^3.14.0
